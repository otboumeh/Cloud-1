version: '3.8'

services:
  mariadb:
    build: requirements/mariadb
    image: mariadb
    container_name: mariadb
    restart: always
    networks:
      - inception
    volumes:
      - mariadb_data:/var/lib/mysql
    secrets:
      - db_password
      - db_root_password
    environment:
      - SQL_DATABASE=${SQL_DATABASE}
      - SQL_USER=${SQL_USER}
      - SQL_PASSWORD_FILE=/run/secrets/db_password
      - SQL_ROOT_PASSWORD_FILE=/run/secrets/db_root_password

  wordpress:
    build: requirements/wordpress
    image: wordpress
    container_name: wordpress
    depends_on:
      - mariadb
    restart: always
    networks:
      - inception
    volumes:
      - wordpress_data:/var/www/wordpress
    secrets:
      - db_password
      - credentials
      - user1_password
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
      - SITE_TITLE=${SITE_TITLE}
      - ADMIN_USER=${ADMIN_USER}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - SQL_DATABASE=${SQL_DATABASE}
      - SQL_USER=${SQL_USER}
      - SQL_HOST=mariadb
      - USER1_LOGIN=${USER1_LOGIN}
      - USER1_EMAIL=${USER1_EMAIL}

  nginx:
    build: requirements/nginx
    image: nginx
    container_name: nginx
    depends_on:
      - wordpress
    restart: always
    networks:
      - inception
    ports:
      - "443:443"
    volumes:
      - wordpress_data:/var/www/wordpress

networks:
  inception:
    driver: bridge

volumes:
  wordpress_data:
    driver: local
    driver_opts:
      type: none
      device: /home/otmane/data/wordpress
      o: bind
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      device: /home/otmane/data/mariadb
      o: bind

secrets:
  db_password:
    file: secrets/db_password.txt
  db_root_password:
    file: secrets/db_root_password.txt
  credentials:
    file: secrets/credentials.txt
  user1_password:
    file: secrets/user1_password.txt
