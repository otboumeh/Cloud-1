- name: Copiar la carpeta srcs al servidor remoto
  copy:
    src: ../../../srcs/
    dest: /root/cloud-1/srcs/
    mode: '0755'

- name: Crear carpetas de datos para los volumenes
  file:
    path: "{{ item }}"
    state: directory
    mode: '0777'
  with_items:
    - /home/otmane/data/mariadb
    - /home/otmane/data/wordpress

- name: Lanzar el proyecto con el Makefile
  command: make all
  args:
    chdir: /root/cloud-1/srcs
    creates: /home/otmane/data/wordpress/wp-config.php
